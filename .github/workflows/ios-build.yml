name: Build iOS IPA

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Flet
        run: |
          python -m pip install --upgrade pip
          pip install flet>=0.28.3

      - name: Verify project
        run: |
          python -m py_compile main.py

      - name: Build iOS app
        run: |
          flet build ipa --verbose

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Stat-Tracker-for-IT-Council-iOS
          path: build/ipa/*.ipa
