name: Build Unsigned iOS IPA

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Verify Flutter
        run: flutter doctor

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flet

      - name: Verify Python
        run: |
          python -m py_compile main.py

      - name: Build iOS Archive
        run: |
          yes | flet build ipa --verbose

      - name: Show build output
        if: always()
        run: |
          echo "===== BUILD DIRECTORY ====="
          find build

      - name: Locate .app
        shell: bash
        run: |
          APP=$(find build -type d -name "*.app" | head -n 1)

          if [ -z "$APP" ]; then
            echo "❌ No .app found!"
            exit 1
          fi

          echo "Found app:"
          echo "$APP"

          echo "APP_PATH=$APP" >> $GITHUB_ENV

      - name: Create Payload
        shell: bash
        run: |
          rm -rf Payload
          mkdir Payload
          cp -R "$APP_PATH" Payload/

      - name: Create unsigned IPA
        shell: bash
        run: |
          rm -f Stat-Tracker-for-IT-Council-unsigned.ipa
          /usr/bin/zip -qry Stat-Tracker-for-IT-Council-unsigned.ipa Payload

      - name: Verify IPA
        shell: bash
        run: |
          echo "===== IPA CONTENTS ====="
          unzip -l Stat-Tracker-for-IT-Council-unsigned.ipa

      - name: Upload unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: Stat-Tracker-for-IT-Council-unsigned
          path: Stat-Tracker-for-IT-Council-unsigned.ipa
          if-no-files-found: error

      - name: Upload XCArchive
        uses: actions/upload-artifact@v4
        with:
          name: Stat-Tracker-XCArchive
          path: build/ipa
          if-no-files-found: warn
